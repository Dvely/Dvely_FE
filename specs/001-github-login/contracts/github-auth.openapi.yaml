openapi: 3.0.3
info:
  title: GitHub Auth API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /auth/github/url:
    get:
      summary: GitHub OAuth 시작 URL 조회
      responses:
        '200':
          description: OAuth 시작 URL
          content:
            application/json:
              schema:
                type: object
                required: [url, state]
                properties:
                  url:
                    type: string
                  state:
                    type: string
  /auth/github/callback:
    get:
      summary: GitHub OAuth callback 처리
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 로그인 성공
        '400':
          description: code/state 오류
  /me:
    get:
      summary: 현재 로그인 사용자 조회
      responses:
        '200':
          description: 사용자 정보
  /me/github-connection:
    get:
      summary: GitHub 연동 상태 조회
      responses:
        '200':
          description: 연동 상태
          content:
            application/json:
              schema:
                type: object
                required:
                  - provider
                  - connected
                  - status
                  - tokenPresent
                  - tokenValid
                  - requiredPermissionsSatisfied
                  - reconnectRequired
                properties:
                  provider:
                    type: string
                    example: github
                  connected:
                    type: boolean
                  status:
                    type: string
                    enum:
                      - NOT_CONNECTED
                      - CONNECTED
                      - TOKEN_INVALID
                      - TOKEN_EXPIRED
                      - PERMISSION_MISMATCH
                      - RECONNECT_REQUIRED
                  tokenPresent:
                    type: boolean
                  tokenValid:
                    type: boolean
                  requiredPermissionsSatisfied:
                    type: boolean
                  reconnectRequired:
                    type: boolean
                  lastValidatedAt:
                    type: string
                    format: date-time
    delete:
      summary: GitHub 연동 해제
      responses:
        '204':
          description: 해제 완료
  /auth/logout:
    post:
      summary: 서비스 세션 로그아웃
      responses:
        '204':
          description: 로그아웃 완료
